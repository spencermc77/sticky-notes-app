{% extends 'notes/base.html' %}

{% block content %}

<a href="/create/">Create Note</a>

<ul>
    {% for note in notes %}
        <li>
            <strong>{{ note.title }}</strong><br>
            {{ note.content }}<br>
            <a href="/update/{{ note.id }}/">Edit</a><br>
            <a href="/delete/{{ note.id }}/">Delete</a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
